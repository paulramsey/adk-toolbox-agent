title: Build an Enterprise-ready AI Agent with Agent Development Kit (ADK) and MCP Toolbox

thumbnail_summary: A hands-on lab guiding you through building and deploying a secure, enterprise-ready AI Agent using ADK and MCP Toolbox.

purpose: This lab demonstrates how to build and deploy a sophisticated, secure AI agent capable of interacting with sensitive financial data in an enterprise environment using Google's Agent Development Kit (ADK).

business_value: Equip developers and organizations to build, deploy, and operationalize autonomous agents that can safely connect to and reason about sensitive data across enterprise systems.

technical_value: Gain hands-on experience integrating ADK, MCP Toolbox, AlloyDB, Cloud SQL, and Spanner while mastering critical security controls like VPC, Private Service Connect (PSC), and Identity-Aware Proxy (IAP).

